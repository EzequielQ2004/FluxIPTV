<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flux IPTV</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <img src="../icons/icon-48.png" alt="Flux" class="logo">
      <h1>Flux IPTV</h1>
    </header>

    <div class="suggestion hidden" id="suggestion">
      <div class="suggestion-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
        </svg>
      </div>
      <div class="suggestion-body">
        <div class="suggestion-label">URL detectada en clipboard</div>
        <div class="suggestion-url" id="suggestionUrl"></div>
      </div>
      <div class="suggestion-actions">
        <button class="suggestion-btn suggestion-btn--add" id="suggestionAdd">Agregar</button>
        <button class="suggestion-btn suggestion-btn--dismiss" id="suggestionDismiss">×</button>
      </div>
    </div>

    <div class="playlist-list" id="playlistList">
      <div class="empty-state" id="emptyState">
        <p>No hay listas guardadas</p>
        <p class="hint">Agregá una URL de lista M3U abajo</p>
      </div>
    </div>

    <div class="add-form">
      <input type="text" id="urlInput" placeholder="https://ejemplo.com/lista.m3u" class="url-input">
      <div class="form-row">
        <input type="text" id="nameInput" placeholder="Nombre (opcional)" class="name-input">
        <button id="addBtn" class="btn btn-primary">Agregar</button>
      </div>
      <p class="error" id="errorMsg"></p>
    </div>

    <footer class="footer">
      <a href="https://fluxiptv.qzz.io" target="_blank" class="link">Abrir Flux IPTV</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
